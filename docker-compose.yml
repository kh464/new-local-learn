services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: .
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      REDIS_URL: redis://redis:6379/0
      ARTIFACTS_DIR: /app/artifacts
    ports:
      - "8000:8000"
    volumes:
      - ./artifacts:/app/artifacts
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/readyz', timeout=2).read()"]
      interval: 10s
      timeout: 5s
      retries: 10

  worker:
    build:
      context: .
    restart: unless-stopped
    command: ["arq", "app.tasks.worker.WorkerSettings"]
    depends_on:
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      REDIS_URL: redis://redis:6379/0
      ARTIFACTS_DIR: /app/artifacts
    volumes:
      - ./artifacts:/app/artifacts

volumes:
  redis-data:
